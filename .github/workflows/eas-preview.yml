name: EAS Build & Release APK

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

env:
  EAS_GITHUB_APP_NAME: ${{ github.event.repository.name }}
  EAS_GITHUB_PROJECT_ID: ${{ vars.EAS_PROJECT_ID }}

jobs:
  build-and-release:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
  
      - name: Install dependencies
        run: bun install 

      - name: Generate PEM file
        run: |
          echo "${{ secrets.MALNUTRIX_SERVER_CERT }}" > ./temp_cert.pem 
          mkdir -p assets/crypto
          mv ./temp_cert.pem assets/crypto/server-cert.pem


      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_QRCODE_SENDER_APP_ID=${{ vars.EXPO_PUBLIC_QRCODE_SENDER_APP_ID }}" >> .env
          echo "EXPO_PUBLIC_QRCODE_RECEIVER_APP_ID=${{ vars.EXPO_PUBLIC_QRCODE_RECEIVER_APP_ID }}" >> .env
          echo "EXPO_SECRET_KEY=${{ secrets.EXPO_SECRET_KEY }}" >> .env

      - name: Build with EAS
        run: eas build --profile preview --platform android --non-interactive --wait

      - name: Download APK
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          curl -L -o app-preview.apk "$BUILD_URL"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Pre-release ${{ github.ref_name }}
          body: |
            ## Beta Release ${{ github.ref_name }}
            
            Android APK build from EAS.
          draft: false
          prerelease: true
          files: app-preview.apk