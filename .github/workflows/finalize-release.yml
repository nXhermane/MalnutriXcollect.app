name: Finalize Release

on:
  repository_dispatch:
    types: [finalize-release]
  workflow_dispatch: 
    inputs:
      version:
        description: 'App version (e.g. 2.0.0-beta.2)'
        required: true
      artifact_url:
        description: 'Direct URL to the APK artifact'
        required: true

jobs:
  finalize:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "artifact_url=${{ github.event.client_payload.artifact_url }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "artifact_url=${{ inputs.artifact_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate inputs
        run: |
          if [ -z "${{ steps.inputs.outputs.version }}" ]; then
            echo "❌ version is empty. Aborting."
            exit 1
          fi
          if [ -z "${{ steps.inputs.outputs.artifact_url }}" ]; then
            echo "❌ artifact_url is empty. Aborting."
            exit 1
          fi
          echo "✅ version=${{ steps.inputs.outputs.version }}"
          echo "✅ artifact_url=${{ steps.inputs.outputs.artifact_url }}"

      - name: Find matching draft release
        id: find_draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.inputs.outputs.version }}"
          TAG="v${VERSION}"
          echo "Looking for draft release with tag: $TAG"

          DRAFT_TAG=$(gh release list --json tagName,isDraft --limit 20 \
            | jq -r --arg tag "$TAG" '.[] | select(.isDraft == true and .tagName == $tag) | .tagName')

          if [ -z "$DRAFT_TAG" ]; then
            echo "❌ No draft release found for tag $TAG. Aborting."
            exit 1
          fi

          echo "✅ Found draft release: $DRAFT_TAG"
          echo "draft_tag=$DRAFT_TAG" >> $GITHUB_OUTPUT

      - name: Download EAS artifact
        run: |
          echo "⬇️ Downloading APK from EAS..."
          curl -L -o app-release.apk "${{ steps.inputs.outputs.artifact_url }}"
          echo "✅ APK downloaded ($(du -sh app-release.apk | cut -f1))"

      - name: Upload artifact and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.find_draft.outputs.draft_tag }}"
          echo "📦 Uploading APK to release $TAG..."
          gh release upload "$TAG" app-release.apk
          echo "🚀 Publishing release $TAG..."
          gh release edit "$TAG" --draft=false
          echo "✅ Release $TAG successfully published!"
