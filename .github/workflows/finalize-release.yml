name: Finalize Release

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes
  workflow_dispatch:        # Keep manual trigger as fallback

jobs:
  finalize:
    name: Check EAS Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check for Draft Releases
        id: check_draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run scripts/parse-draft-release.mjs

      - name: Setup Node
        if: steps.check_draft.outputs.has_draft == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo & EAS CLI
        if: steps.check_draft.outputs.has_draft == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.check_draft.outputs.has_draft == 'true'
        run: bun install

      - name: Check EAS Build Status
        if: steps.check_draft.outputs.has_draft == 'true'
        id: check_build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bun run scripts/check-eas-build.mjs ${{ steps.check_draft.outputs.draft_version }} android

      - name: Download EAS Artifact
        if: steps.check_draft.outputs.has_draft == 'true' && steps.check_build.outputs.build_status == 'FINISHED'
        run: curl -L -o app-release.apk "${{ steps.check_build.outputs.artifact_url }}"

      - name: Finalize GitHub Release
        if: steps.check_draft.outputs.has_draft == 'true' && steps.check_build.outputs.build_status == 'FINISHED'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Uploading artifact and publishing release..."
          gh release upload ${{ steps.check_draft.outputs.draft_tag }} app-release.apk
          gh release edit ${{ steps.check_draft.outputs.draft_tag }} --draft=false
          echo "✅ Release successfully published!"
