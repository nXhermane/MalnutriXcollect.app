name: Release

on:
  push:
    branches:
      - main
      - beta

jobs:
  release:
    name: Auto-bump, Tag, and Start EAS Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      bumped: ${{ steps.bump.outputs.bumped }}
      is_beta: ${{ steps.bump.outputs.is_beta }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SECRET_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install

      - name: Bump version & tag
        id: bump
        run: bun run scripts/bump-version.mjs

      - name: Generate changelog
        if: steps.bump.outputs.bumped == 'true'
        run: bun run scripts/generate-changelog.mjs

      - name: Polish release notes with AI
        if: steps.bump.outputs.bumped == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          RAW_NOTES=$(cat RELEASE_NOTES.md)
          TEMPLATE=$(cat .github/release-notes-template.md)

          # Build payload entirely via jq to safely handle special characters in commits
          PAYLOAD=$(jq -n \
            --arg system  "$TEMPLATE" \
            --arg version "$NEW_TAG" \
            --arg branch  "$BRANCH_NAME" \
            --arg notes   "$RAW_NOTES" \
            '{
              model: "gpt-4o-mini",
              temperature: 0.3,
              max_tokens: 1024,
              messages: [
                { role: "system", content: $system },
                {
                  role: "user",
                  content: (
                    "Version : " + $version + " (branche : " + $branch + ")\n\n" +
                    "Voici la liste brute des commits inclus dans cette release. " +
                    "Génère les release notes en français en suivant **strictement** le prompt système (template, règles, format, exemples).\n\n" +
                    "Ne commente pas ta réponse. Produis uniquement le contenu final des release notes.\n\n" +
                    "---\n\n" +
                    $notes
                  )
                }
              ]
            }')

          RESPONSE=$(curl -s -w "\n__HTTP_STATUS__:%{http_code}" \
            https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_STATUS=$(echo "$RESPONSE" | grep -o '__HTTP_STATUS__:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed 's/__HTTP_STATUS__:[0-9]*$//')

          POLISHED=$(echo "$BODY" | jq -r '.choices[0].message.content // empty')

          if [ -z "$POLISHED" ] || [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ AI polishing failed (HTTP $HTTP_STATUS) — using raw release notes as fallback."
            echo "--- API Response ---"
            echo "$BODY" | jq '.' || echo "$BODY"
            echo "--------------------"
          else
            # Strip any accidental markdown code fences the model may have added
            POLISHED=$(echo "$POLISHED" | sed '/^```/d')
            echo "$POLISHED" > RELEASE_NOTES.md
            echo "✅ Release notes polished by AI (HTTP $HTTP_STATUS)."
            echo "--- Preview (first 20 lines) ---"
            head -20 RELEASE_NOTES.md
            echo "--------------------------------"
          fi

      - name: Ensure exact versions
        if: steps.bump.outputs.bumped == 'true'
        run: bun install --lockfile-only

      - name: Commit version bump & push tag
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git add CHANGELOG.md package.json app.config.ts bun.lock
          git commit -m "chore(release): ${{ steps.bump.outputs.new_tag }} [skip ci]"
          git tag ${{ steps.bump.outputs.new_tag }}
          # Push the commit and the tag
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Pre-install script (Crypto certs)
        if: steps.bump.outputs.bumped == 'true'
        run: bun run eas-build-pre-install
        env:
          SERVER_CERT_CONTENT: ${{ secrets.SERVER_CERT_CONTENT }}

      - name: Determine EAS Profile
        if: steps.bump.outputs.bumped == 'true'
        id: profile
        run: |
          if [ "${{ steps.bump.outputs.is_beta }}" == "true" ]; then
            echo "profile=preview" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "profile=production" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Start EAS Build (No Wait)
        if: steps.bump.outputs.bumped == 'true'
        run: |
          eas build --profile ${{ steps.profile.outputs.profile }} --platform android --non-interactive --no-wait --message "release: ${{ steps.bump.outputs.new_tag }}"

      - name: Create Draft GitHub Release
        if: steps.bump.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: Release ${{ steps.bump.outputs.new_tag }}
          body_path: RELEASE_NOTES.md
          draft: true # DRAFT is important! finalize-release.yml will pick it up
          prerelease: ${{ steps.profile.outputs.is_prerelease == 'true' }}
